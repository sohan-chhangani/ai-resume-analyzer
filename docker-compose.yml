services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_resume_analyzer
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ai_user -d ai_resume_analyzer
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://ai_user:ai_password@db:5432/ai_resume_analyzer
      UPLOAD_DIR: /app/uploads
    volumes:
      - resume_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  resume_uploads:
